<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .swatch span { font-size: 10px; font-weight: 600; }
  .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .name { font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: var(--color-gray-800); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--color-gray-500); }
  .primary-highlight { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ph-swatch { width: 48px; height: 48px; border-radius: var(--radius-md); background: var(--color-teal-600); }
  .ph-label { font-family: var(--font-heading); font-weight: 700; font-size: 15px; color: var(--color-gray-900); }
  .ph-sub { font-family: var(--font-mono); font-size: 12px; color: var(--color-gray-500); }
</style>
</head>
<body>
<div class="primary-highlight">
  <div class="ph-swatch"></div>
  <div>
    <div class="ph-label">Teal — Brand Primary</div>
    <div class="ph-sub">#1C6278 · HSL 196° 63% 29%</div>
  </div>
</div>
<div class="row">
  <div class="swatch" style="background:#061E28"><span style="color:#7DC0D6">950</span></div>
  <div class="swatch" style="background:#0D3D4F"><span style="color:#7DC0D6">900</span></div>
  <div class="swatch" style="background:#134F65"><span style="color:#AEDCE8">800</span></div>
  <div class="swatch" style="background:#1A607A"><span style="color:#D2EEF4">700</span></div>
  <div class="swatch" style="background:#1C6278;outline:2px solid #fff;outline-offset:-3px"><span style="color:#EEF3F6">600 ★</span></div>
  <div class="swatch" style="background:#237494"><span style="color:#EEF3F6">500</span></div>
  <div class="swatch" style="background:#2D8BAD"><span style="color:#EEF3F6">400</span></div>
  <div class="swatch" style="background:#4AA5C4"><span style="color:#fff">300</span></div>
  <div class="swatch" style="background:#7DC0D6"><span style="color:#134F65">200</span></div>
  <div class="swatch" style="background:#AEDCE8"><span style="color:#134F65">100</span></div>
  <div class="swatch" style="background:#D2EEF4"><span style="color:#1C6278">75</span></div>
  <div class="swatch" style="background:#E8F5F8"><span style="color:#237494">50</span></div>
  <div class="swatch" style="background:#EEF3F6"><span style="color:#237494">25</span></div>
</div>
</body>
</html>
