<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch { flex: 1; height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .swatch span { font-size: 10px; font-weight: 600; }
  .title { font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: var(--color-gray-800); margin-bottom: 12px; }
</style>
</head>
<body>
<div class="title">Neutrals — Cool Gray</div>
<div class="row">
  <div class="swatch" style="background:#0A0F14"><span style="color:#9CA3AF">950</span></div>
  <div class="swatch" style="background:#111827"><span style="color:#9CA3AF">900</span></div>
  <div class="swatch" style="background:#1F2937"><span style="color:#9CA3AF">800</span></div>
  <div class="swatch" style="background:#374151"><span style="color:#D1D5DB">700</span></div>
  <div class="swatch" style="background:#4B5563"><span style="color:#D1D5DB">600</span></div>
  <div class="swatch" style="background:#6B7280"><span style="color:#F3F4F6">500</span></div>
  <div class="swatch" style="background:#9CA3AF"><span style="color:#1F2937">400</span></div>
  <div class="swatch" style="background:#D1D5DB"><span style="color:#374151">300</span></div>
  <div class="swatch" style="background:#E5E7EB"><span style="color:#4B5563">200</span></div>
  <div class="swatch" style="background:#F3F4F6"><span style="color:#6B7280">100</span></div>
  <div class="swatch" style="background:#F9FAFB"><span style="color:#9CA3AF">50</span></div>
  <div class="swatch" style="background:#FFFFFF; border-top: 1px solid #E5E7EB"><span style="color:#9CA3AF">White</span></div>
</div>
</body>
</html>
