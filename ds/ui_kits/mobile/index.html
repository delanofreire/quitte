<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quitte — Mobile App UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #CBD5DA; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 24px; gap: 32px; flex-wrap: wrap; }

/* Phone shell */
.phone { width: 375px; height: 812px; background: #111; border-radius: 48px; padding: 12px; box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.08); flex-shrink: 0; }
.phone-inner { width: 100%; height: 100%; border-radius: 38px; overflow: hidden; position: relative; background: #EEF3F6; display: flex; flex-direction: column; }
.phone-label { text-align: center; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 12px; letter-spacing: 0.06em; text-transform: uppercase; }

/* Status bar */
.status-bar { height: 44px; background: #1C6278; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; flex-shrink: 0; }
.status-time { font-family: 'Inter'; font-size: 15px; font-weight: 600; color: #fff; }
.status-icons { display: flex; gap: 6px; align-items: center; }

/* Scrollable content */
.screen-content { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
.screen-content::-webkit-scrollbar { display: none; }

/* Bottom nav */
.bottom-nav { height: 80px; background: #fff; border-top: 1px solid #E5E7EB; display: flex; align-items: flex-start; padding-top: 10px; flex-shrink: 0; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
.nav-label { font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const T = {
  teal600: '#1C6278', teal700: '#1A607A', teal800: '#134F65', teal900: '#0D3D4F',
  teal500: '#237494', teal400: '#2D8BAD', teal300: '#4AA5C4',
  teal100: '#AEDCE8', teal75: '#D2EEF4', teal50: '#E8F5F8', teal25: '#EEF3F6',
  gray900: '#111827', gray800: '#1F2937', gray700: '#374151',
  gray600: '#4B5563', gray500: '#6B7280', gray400: '#9CA3AF',
  gray300: '#D1D5DB', gray200: '#E5E7EB', gray100: '#F3F4F6', white: '#fff',
  green500: '#10B981', green50: '#ECFDF5', green700: '#047857', green100: '#D1FAE5',
  amber500: '#F59E0B', amber50: '#FFFBEB', amber700: '#B45309', amber100: '#FEF3C7',
  red500: '#EF4444', red50: '#FEF2F2', red700: '#B91C1C', red100: '#FEE2E2',
};

const Svg = ({ children, size = 22, color = 'currentColor', sw = 1.8 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);

/* Status bar icons */
function StatusBar({ bg = T.teal800 }) {
  return (
    <div style={{ height: 44, background: bg, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', flexShrink: 0 }}>
      <span style={{ fontFamily: 'Inter', fontSize: 15, fontWeight: 600, color: '#fff' }}>9:41</span>
      <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white" opacity="0.9"><rect x="0" y="5" width="3" height="7" rx="1"/><rect x="4.5" y="3" width="3" height="9" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="white" strokeWidth="1.5" opacity="0.9"><path d="M8 3C9.9 3 11.6 3.8 12.8 5M3.2 5C4.4 3.8 6.1 3 8 3"/><path d="M8 7C8.9 7 9.7 7.4 10.2 8M5.8 8C6.3 7.4 7.1 7 8 7"/><circle cx="8" cy="11" r="1" fill="white" stroke="none"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" strokeOpacity="0.35"/><rect x="2" y="2" width="17" height="9" rx="2" fill="white"/><path d="M24 4.5V8.5C24.8 8.2 25.5 7.4 25.5 6.5C25.5 5.6 24.8 4.8 24 4.5Z" fill="white" fillOpacity="0.4"/></svg>
      </div>
    </div>
  );
}

/* Bottom nav */
function BottomNav({ active, setScreen }) {
  const items = [
    { id: 'home', label: 'Início', icon: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></> },
    { id: 'debts', label: 'Dívidas', icon: <><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></> },
    { id: 'add', label: '', icon: null },
    { id: 'budget', label: 'Orçamento', icon: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></> },
    { id: 'profile', label: 'Perfil', icon: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></> },
  ];
  return (
    <div style={{ height: 80, background: T.white, borderTop: `1px solid ${T.gray200}`, display: 'flex', alignItems: 'flex-start', paddingTop: 8, flexShrink: 0 }}>
      {items.map(item => {
        if (item.id === 'add') return (
          <div key="add" style={{ flex: 1, display: 'flex', justifyContent: 'center', alignItems: 'flex-start', marginTop: -22 }}>
            <div onClick={() => setScreen('add')} style={{ width: 54, height: 54, borderRadius: '50%', background: T.teal600, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 16px rgba(28,98,120,0.4)', cursor: 'pointer' }}>
              <Svg size={24} color="#fff" sw={2.5}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>
            </div>
          </div>
        );
        const isActive = active === item.id;
        return (
          <div key={item.id} onClick={() => setScreen(item.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, cursor: 'pointer' }}>
            <Svg size={22} color={isActive ? T.teal600 : T.gray400} sw={isActive ? 2.2 : 1.8}>{item.icon}</Svg>
            <span style={{ fontSize: 10, fontWeight: isActive ? 600 : 500, color: isActive ? T.teal600 : T.gray400 }}>{item.label}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ── HOME SCREEN ── */
function HomeScreen() {
  const transactions = [
    { desc: 'Supermercado', cat: 'Alimentação', value: '- R$ 234,50', neg: true, date: 'Hoje' },
    { desc: 'Salário', cat: 'Receita', value: '+ R$ 4.800,00', neg: false, date: 'Ontem' },
    { desc: 'Parcela Nubank', cat: 'Dívida', value: '- R$ 450,00', neg: true, date: '22 abr' },
    { desc: 'Uber', cat: 'Transporte', value: '- R$ 28,90', neg: true, date: '21 abr' },
  ];
  return (
    <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <StatusBar bg={T.teal800} />
      <div style={{ flex: 1, overflowY: 'auto', scrollbarWidth: 'none' }}>
        {/* Header */}
        <div style={{ background: `linear-gradient(160deg, ${T.teal900} 0%, ${T.teal600} 100%)`, padding: '20px 20px 32px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', marginBottom: 2 }}>Bom dia, Maria</div>
              <div style={{ fontFamily: 'Barlow', fontWeight: 700, fontSize: 18, color: '#fff' }}>Seus números de hoje</div>
            </div>
            <div style={{ width: 38, height: 38, borderRadius: '50%', background: T.teal400, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Barlow', fontWeight: 700, fontSize: 15, color: '#fff' }}>MS</div>
          </div>
          {/* Balance card */}
          <div style={{ background: 'rgba(255,255,255,0.10)', borderRadius: 16, padding: '18px 20px', backdropFilter: 'blur(8px)', border: '1px solid rgba(255,255,255,0.12)' }}>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 6, letterSpacing: '0.06em', textTransform: 'uppercase', fontWeight: 600 }}>Saldo disponível</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 36, fontWeight: 500, color: '#fff', letterSpacing: '-0.02em', marginBottom: 16 }}>R$ 3.240,00</div>
            <div style={{ display: 'flex', gap: 20 }}>
              <div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Entradas</div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 14, fontWeight: 500, color: '#5EEAD4' }}>+ R$ 5.700</div>
              </div>
              <div style={{ width: 1, background: 'rgba(255,255,255,0.12)' }}></div>
              <div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Saídas</div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 14, fontWeight: 500, color: '#FCA5A5' }}>- R$ 2.460</div>
              </div>
              <div style={{ width: 1, background: 'rgba(255,255,255,0.12)' }}></div>
              <div>
                <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 2 }}>Meta</div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 14, fontWeight: 500, color: T.teal300 }}>62%</div>
              </div>
            </div>
          </div>
        </div>

        {/* Quick actions */}
        <div style={{ margin: '-16px 16px 0', background: T.white, borderRadius: 16, padding: '16px', boxShadow: '0 4px 20px rgba(28,98,120,0.12)', marginTop: -16, position: 'relative', zIndex: 2 }}>
          <div style={{ display: 'flex', gap: 0 }}>
            {[
              { label: 'Pagar', icon: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></> },
              { label: 'Transferir', icon: <><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></> },
              { label: 'Histórico', icon: <><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.18-4.11"/></> },
              { label: 'Metas', icon: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></> },
            ].map((a, i) => (
              <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 48, height: 48, borderRadius: 14, background: T.teal25, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Svg size={20} color={T.teal600} sw={1.8}>{a.icon}</Svg>
                </div>
                <span style={{ fontSize: 11, fontWeight: 600, color: T.gray700 }}>{a.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Alert */}
        <div style={{ margin: '16px 16px 0', background: T.amber50, borderRadius: 12, padding: '12px 14px', border: `1px solid ${T.amber100}`, display: 'flex', alignItems: 'center', gap: 10 }}>
          <Svg size={18} color={T.amber500} sw={2}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Svg>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.amber700 }}>Parcela vencendo em 3 dias</div>
            <div style={{ fontSize: 11, color: T.amber700, opacity: 0.8 }}>Cartão Nubank · R$ 450,00</div>
          </div>
          <span style={{ fontSize: 11, fontWeight: 600, color: T.amber700, cursor: 'pointer' }}>Pagar →</span>
        </div>

        {/* Debt progress */}
        <div style={{ margin: '16px 16px 0', background: T.white, borderRadius: 14, padding: '16px', boxShadow: '0 2px 8px rgba(28,98,120,0.07)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <span style={{ fontFamily: 'Barlow', fontWeight: 700, fontSize: 15, color: T.gray900 }}>Quitação em progresso</span>
            <span style={{ fontSize: 12, color: T.teal600, fontWeight: 600 }}>Ver todas</span>
          </div>
          {[
            { name: 'Cartão Nubank', amount: 'R$ 4.280', pct: 28, color: T.red500 },
            { name: 'Financiamento', amount: 'R$ 22.400', pct: 62, color: T.teal600 },
          ].map((d, i) => (
            <div key={i} style={{ marginBottom: i === 0 ? 12 : 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: T.gray800 }}>{d.name}</span>
                <span style={{ fontFamily: 'JetBrains Mono', fontSize: 12, color: T.gray600 }}>{d.amount}</span>
              </div>
              <div style={{ height: 6, background: T.gray200, borderRadius: 9999, overflow: 'hidden', marginBottom: 3 }}>
                <div style={{ height: '100%', width: `${d.pct}%`, background: d.color, borderRadius: 9999 }}></div>
              </div>
              <span style={{ fontSize: 11, color: T.gray400 }}>{d.pct}% quitado</span>
            </div>
          ))}
        </div>

        {/* Transactions */}
        <div style={{ margin: '16px 16px 24px', background: T.white, borderRadius: 14, padding: '16px', boxShadow: '0 2px 8px rgba(28,98,120,0.07)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <span style={{ fontFamily: 'Barlow', fontWeight: 700, fontSize: 15, color: T.gray900 }}>Últimas transações</span>
            <span style={{ fontSize: 12, color: T.teal600, fontWeight: 600 }}>Ver todas</span>
          </div>
          {transactions.map((t, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, paddingBottom: i < transactions.length - 1 ? 12 : 0, marginBottom: i < transactions.length - 1 ? 12 : 0, borderBottom: i < transactions.length - 1 ? `1px solid ${T.gray100}` : 'none' }}>
              <div style={{ width: 38, height: 38, borderRadius: 11, background: t.neg ? T.red50 : T.green50, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Svg size={17} color={t.neg ? T.red500 : T.green500} sw={1.8}>
                  {t.neg ? <><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></> : <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>}
                </Svg>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.gray900 }}>{t.desc}</div>
                <div style={{ fontSize: 11, color: T.gray500 }}>{t.cat} · {t.date}</div>
              </div>
              <div style={{ fontFamily: 'JetBrains Mono', fontSize: 13, fontWeight: 500, color: t.neg ? T.red700 : T.green700 }}>{t.value}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── DEBTS SCREEN ── */
function DebtsScreen() {
  const debts = [
    { name: 'Cartão Nubank', bank: 'Nubank', amount: 'R$ 4.280,00', due: '01/05/2025', rate: '23,9% a.m.', pct: 28, type: 'danger', badge: 'Atrasado' },
    { name: 'Financiamento Auto', bank: 'Itaú', amount: 'R$ 22.400,00', due: '18/05/2025', rate: '1,2% a.m.', pct: 62, type: 'success', badge: 'Em dia' },
    { name: 'Empréstimo pessoal', bank: 'CEF', amount: 'R$ 8.100,00', due: '10/05/2025', rate: '3,5% a.m.', pct: 45, type: 'warning', badge: 'Atenção' },
  ];
  const badgeColors = { danger: [T.red100, T.red700], success: [T.green100, T.green700], warning: [T.amber100, T.amber700] };
  const barColors = { danger: T.red500, success: T.green500, warning: T.amber500 };

  return (
    <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <StatusBar bg={T.teal800} />
      <div style={{ flex: 1, overflowY: 'auto', scrollbarWidth: 'none' }}>
        {/* Header */}
        <div style={{ background: `linear-gradient(160deg, ${T.teal900} 0%, ${T.teal600} 100%)`, padding: '16px 20px 28px' }}>
          <div style={{ fontFamily: 'Barlow', fontWeight: 800, fontSize: 22, color: '#fff', marginBottom: 4 }}>Minhas dívidas</div>
          <div style={{ fontFamily: 'JetBrains Mono', fontSize: 30, fontWeight: 500, color: '#fff', marginBottom: 4 }}>R$ 34.780,00</div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)' }}>Total em aberto · 3 dívidas ativas</div>
        </div>
        <div style={{ margin: '-14px 14px 0', position: 'relative', zIndex: 2, display: 'flex', gap: 10 }}>
          {[['2', 'Em atraso', T.red50, T.red700], ['1', 'Atenção', T.amber50, T.amber700], ['1', 'Em dia', T.green50, T.green700]].map(([n, l, bg, c], i) => (
            <div key={i} style={{ flex: 1, background: bg, borderRadius: 10, padding: '10px', textAlign: 'center', boxShadow: '0 2px 8px rgba(0,0,0,0.06)' }}>
              <div style={{ fontFamily: 'JetBrains Mono', fontSize: 20, fontWeight: 500, color: c }}>{n}</div>
              <div style={{ fontSize: 10, fontWeight: 600, color: c, opacity: 0.8 }}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{ padding: '16px 14px 24px', display: 'flex', flexDirection: 'column', gap: 12, marginTop: 6 }}>
          {debts.map((d, i) => {
            const [bg, tc] = badgeColors[d.type];
            return (
              <div key={i} style={{ background: T.white, borderRadius: 14, padding: '16px', boxShadow: '0 2px 8px rgba(28,98,120,0.07)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
                  <div>
                    <div style={{ fontFamily: 'Barlow', fontWeight: 700, fontSize: 15, color: T.gray900, marginBottom: 2 }}>{d.name}</div>
                    <div style={{ fontSize: 12, color: T.gray500 }}>{d.bank} · {d.rate}</div>
                  </div>
                  <span style={{ background: bg, color: tc, borderRadius: 9999, padding: '3px 9px', fontSize: 11, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}>
                    <span style={{ width: 6, height: 6, borderRadius: '50%', background: tc }}></span>
                    {d.badge}
                  </span>
                </div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 22, fontWeight: 500, color: T.gray900, marginBottom: 10 }}>{d.amount}</div>
                <div style={{ height: 6, background: T.gray200, borderRadius: 9999, overflow: 'hidden', marginBottom: 6 }}>
                  <div style={{ height: '100%', width: `${d.pct}%`, background: barColors[d.type], borderRadius: 9999 }}></div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: T.gray500 }}>
                  <span>{d.pct}% quitado</span>
                  <span>Vence {d.due}</span>
                </div>
                <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                  <button style={{ flex: 1, background: T.teal600, color: '#fff', border: 'none', borderRadius: 9, padding: '10px', fontFamily: 'Inter', fontWeight: 600, fontSize: 13, cursor: 'pointer' }}>Registrar pagamento</button>
                  <button style={{ background: T.teal25, color: T.teal600, border: 'none', borderRadius: 9, padding: '10px 14px', fontFamily: 'Inter', fontWeight: 600, fontSize: 13, cursor: 'pointer' }}>Detalhes</button>
                </div>
              </div>
            );
          })}
          <button style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: T.white, color: T.teal600, border: `1.5px dashed ${T.teal300}`, borderRadius: 14, padding: '14px', fontFamily: 'Inter', fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>
            <Svg size={18} color={T.teal600} sw={2}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>
            Adicionar nova dívida
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── ADD TRANSACTION SCREEN ── */
function AddScreen() {
  const [type, setType] = useState('expense');
  const [amount, setAmount] = useState('0,00');
  const cats = ['Alimentação', 'Habitação', 'Transporte', 'Saúde', 'Lazer', 'Educação', 'Dívida', 'Receita'];
  const [selCat, setSelCat] = useState('Alimentação');
  return (
    <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <StatusBar bg={T.teal800} />
      <div style={{ flex: 1, overflowY: 'auto', scrollbarWidth: 'none' }}>
        <div style={{ background: `linear-gradient(160deg, ${T.teal900} 0%, ${T.teal600} 100%)`, padding: '20px 20px 40px' }}>
          <div style={{ fontFamily: 'Barlow', fontWeight: 700, fontSize: 20, color: '#fff', marginBottom: 20 }}>Nova transação</div>
          {/* Type toggle */}
          <div style={{ display: 'flex', background: 'rgba(255,255,255,0.12)', borderRadius: 12, padding: 4, marginBottom: 24, gap: 4 }}>
            {[['expense', 'Despesa'], ['income', 'Receita'], ['debt', 'Dívida']].map(([id, label]) => (
              <button key={id} onClick={() => setType(id)} style={{ flex: 1, padding: '8px', borderRadius: 9, border: 'none', background: type === id ? '#fff' : 'transparent', color: type === id ? T.teal700 : 'rgba(255,255,255,0.7)', fontFamily: 'Inter', fontWeight: 600, fontSize: 13, cursor: 'pointer', transition: 'all 150ms' }}>{label}</button>
            ))}
          </div>
          {/* Amount */}
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', marginBottom: 4 }}>Valor</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 44, fontWeight: 500, color: '#fff', letterSpacing: '-0.02em' }}>R$ {amount}</div>
          </div>
        </div>

        <div style={{ margin: '-20px 14px 0', position: 'relative', zIndex: 2, background: T.white, borderRadius: 16, padding: '20px', boxShadow: '0 4px 20px rgba(28,98,120,0.12)' }}>
          {/* Category */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.gray600, marginBottom: 8, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Categoria</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {cats.map(c => (
                <button key={c} onClick={() => setSelCat(c)} style={{ padding: '6px 12px', borderRadius: 9, border: `1.5px solid ${selCat === c ? T.teal600 : T.gray200}`, background: selCat === c ? T.teal50 : T.white, color: selCat === c ? T.teal600 : T.gray600, fontFamily: 'Inter', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>{c}</button>
              ))}
            </div>
          </div>
          {/* Description */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.gray600, marginBottom: 8, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Descrição</div>
            <input placeholder="Ex: Supermercado Extra" style={{ width: '100%', padding: '12px 14px', borderRadius: 10, border: `1.5px solid ${T.gray200}`, fontFamily: 'Inter', fontSize: 14, color: T.gray900, outline: 'none' }} />
          </div>
          {/* Date */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.gray600, marginBottom: 8, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Data</div>
            <input type="date" defaultValue="2025-04-29" style={{ width: '100%', padding: '12px 14px', borderRadius: 10, border: `1.5px solid ${T.gray200}`, fontFamily: 'Inter', fontSize: 14, color: T.gray900, outline: 'none' }} />
          </div>
          <button style={{ width: '100%', background: T.teal600, color: '#fff', border: 'none', borderRadius: 12, padding: '15px', fontFamily: 'Inter', fontWeight: 700, fontSize: 16, cursor: 'pointer' }}>Salvar transação</button>
        </div>

        {/* Numpad */}
        <div style={{ padding: '20px 14px 24px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
            {['1','2','3','4','5','6','7','8','9',',','0','⌫'].map(k => (
              <button key={k} style={{ padding: '16px', borderRadius: 12, border: 'none', background: k === '⌫' ? T.red50 : T.white, color: k === '⌫' ? T.red700 : T.gray900, fontFamily: 'JetBrains Mono', fontSize: 20, fontWeight: 500, cursor: 'pointer', boxShadow: '0 2px 6px rgba(28,98,120,0.07)' }}>{k}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PHONE WRAPPER ── */
function Phone({ label, screen, active, setActive }) {
  const screens = {
    home: <HomeScreen />,
    debts: <DebtsScreen />,
    add: <AddScreen />,
    budget: <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap: 8, color: T.gray400 }}><div style={{fontSize:40}}>💰</div><div style={{fontFamily:'Barlow', fontWeight:700, fontSize:18}}>Orçamento</div><div style={{fontSize:13}}>Em breve</div></div>,
    profile: <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap: 8, color: T.gray400 }}><div style={{fontSize:40}}>👤</div><div style={{fontFamily:'Barlow', fontWeight:700, fontSize:18}}>Perfil</div><div style={{fontSize:13}}>Em breve</div></div>,
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
      <div className="phone">
        <div className="phone-inner">
          {screens[screen] || screens.home}
          <BottomNav active={screen} setScreen={setActive} />
        </div>
      </div>
      <div className="phone-label">{label}</div>
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [s1, setS1] = useState('home');
  const [s2, setS2] = useState('debts');
  const [s3, setS3] = useState('add');
  return (
    <>
      <Phone label="Home · Visão Geral" screen={s1} active={s1} setActive={setS1} />
      <Phone label="Dívidas" screen={s2} active={s2} setActive={setS2} />
      <Phone label="Nova Transação" screen={s3} active={s3} setActive={setS3} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
